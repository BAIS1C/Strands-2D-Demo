<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRANDS // Signal Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #game-container { width: 100vw; height: 100vh; }

        /* ── CROSSHAIR ── */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
            width: 32px; height: 32px;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute;
            background: rgba(0, 194, 255, 0.85);
            box-shadow: 0 0 8px rgba(0, 194, 255, 0.6), 0 0 16px rgba(0, 194, 255, 0.3);
        }
        #crosshair::before { width: 24px; height: 2px; left: 4px; top: 15px; }
        #crosshair::after { width: 2px; height: 24px; left: 15px; top: 4px; }
        #crosshair-dot {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 4px; height: 4px; border-radius: 50%;
            background: #00C2FF;
            box-shadow: 0 0 6px #00C2FF;
            pointer-events: none; z-index: 101;
        }

        /* ── HUD ── */
        #hud {
            position: fixed; bottom: 20px; left: 20px;
            color: #E2E8F0; z-index: 100;
            font-family: 'Courier New', monospace;
        }
        .hud-item {
            margin: 6px 0; font-size: 14px; letter-spacing: 1px;
            background: rgba(10, 11, 13, 0.75);
            padding: 8px 16px;
            border-left: 2px solid #00C2FF;
            backdrop-filter: blur(4px);
        }
        #health-bar {
            width: 180px; height: 6px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 194, 255, 0.3);
            margin-top: 4px;
        }
        #health-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #00C2FF, #F000B8);
            transition: width 0.3s;
        }

        /* ── TUTORIAL PROMPT ── */
        #tutorial-prompt {
            position: fixed; top: 60%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00C2FF; font-size: 18px;
            letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 194, 255, 0.5);
            z-index: 100; text-align: center;
            pointer-events: none;
            transition: opacity 0.6s;
            font-family: 'Courier New', monospace;
        }
        #tutorial-prompt .sub {
            font-size: 12px; color: #A0AEC0;
            letter-spacing: 2px; margin-top: 8px;
            text-shadow: none;
        }

        /* ── WAVE / ZONE INFO ── */
        #zone-info {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            color: #E2E8F0; font-size: 13px;
            letter-spacing: 3px; text-transform: uppercase;
            z-index: 100;
            background: rgba(10, 11, 13, 0.8);
            padding: 10px 30px;
            border: 1px solid rgba(0, 194, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        #zone-info .accent { color: #00C2FF; }

        /* ── WEAPON DISPLAY ── */
        #weapon-display {
            position: fixed; bottom: 20px; right: 20px;
            color: #E2E8F0; z-index: 100; text-align: right;
        }
        .weapon-slot {
            padding: 8px 16px; margin: 4px 0;
            background: rgba(10, 11, 13, 0.6);
            border-right: 2px solid #333;
            font-size: 13px; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .weapon-slot.active {
            background: rgba(0, 194, 255, 0.1);
            border-right: 2px solid #00C2FF;
            color: #00C2FF;
        }

        /* ── LOOT POPUP ── */
        #loot-popup {
            position: fixed; bottom: 140px; left: 50%;
            transform: translateX(-50%);
            color: #F9E100; font-size: 14px;
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(249, 225, 0, 0.4);
            z-index: 100; opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* ── DAMAGE OVERLAY ── */
        #damage-overlay {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 99;
            opacity: 0; transition: opacity 0.15s;
        }

        /* ── MATERIALIZATION PROGRESS ── */
        #materialize-bar {
            position: fixed; top: 60px; left: 50%;
            transform: translateX(-50%);
            z-index: 100; text-align: center;
            opacity: 0; transition: opacity 0.5s;
        }
        #materialize-bar .label {
            font-size: 10px; letter-spacing: 3px;
            color: #6b7280; margin-bottom: 4px;
        }
        #materialize-track {
            width: 200px; height: 2px;
            background: rgba(255,255,255,0.05);
        }
        #materialize-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00C2FF, #F000B8);
            transition: width 0.3s;
        }

        /* ── START SCREEN ── */
        #start-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #0A0B0D 0%, #0d1117 50%, #0A0B0D 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 200; cursor: pointer;
        }
        #start-screen h1 {
            font-size: 36px; color: #00C2FF;
            letter-spacing: 8px; text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0, 194, 255, 0.4);
            margin-bottom: 8px;
        }
        #start-screen .tagline {
            font-size: 12px; color: #F000B8;
            letter-spacing: 6px; text-transform: uppercase;
            margin-bottom: 40px;
        }
        #start-screen .cta {
            color: #00C2FF; font-size: 16px;
            letter-spacing: 4px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        #start-screen .controls {
            color: #6b7280; font-size: 11px;
            letter-spacing: 2px; margin-top: 30px;
        }

        /* ── SCORE POPUP ── */
        .score-popup {
            position: fixed; pointer-events: none; z-index: 100;
            color: #00C2FF; font-size: 16px; font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 194, 255, 0.6);
            animation: scoreFloat 1s ease-out forwards;
        }
        @keyframes scoreFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        /* ── CHROMATIC SCAN ── */
        #scan-line {
            position: fixed; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 194, 255, 0.15), transparent);
            pointer-events: none; z-index: 98;
            animation: scanDown 4s linear infinite;
        }
        @keyframes scanDown {
            0% { top: -2px; }
            100% { top: 100vh; }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <div id="crosshair-dot"></div>

    <div id="hud">
        <div class="hud-item">SIGNAL INTEGRITY</div>
        <div id="health-bar"><div id="health-fill"></div></div>
        <div class="hud-item">SYNC: <span id="score">0</span></div>
        <div class="hud-item">TARGETS: <span id="kills">0</span> / <span id="total-targets">0</span></div>
    </div>

    <div id="zone-info">
        <span class="accent">ZONE</span> <span id="zone-name">GRID ORIGIN</span>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        MATERIALIZED: <span class="accent" id="mat-percent">0</span>%
    </div>

    <div id="weapon-display">
        <div class="weapon-slot active" id="weapon-1">[1] PULSE RIFLE — <span id="ammo">30</span>/30</div>
        <div class="weapon-slot" id="weapon-2">[2] SIGNAL BLADE</div>
    </div>

    <div id="tutorial-prompt"></div>
    <div id="loot-popup"></div>
    <div id="damage-overlay"></div>
    <div id="scan-line"></div>

    <div id="materialize-bar">
        <div class="label">WORLD MATERIALIZATION</div>
        <div id="materialize-track"><div id="materialize-fill"></div></div>
    </div>

    <div id="start-screen">
        <h1>SIGNAL TRAINING</h1>
        <div class="tagline">StrandsNation // Tutorial Protocol</div>
        <div class="cta">[ CLICK TO INITIALIZE ]</div>
        <div class="controls">WASD MOVE &nbsp;|&nbsp; MOUSE AIM &nbsp;|&nbsp; LMB FIRE &nbsp;|&nbsp; 1,2 SWAP &nbsp;|&nbsp; R RELOAD &nbsp;|&nbsp; E LOOT</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        /* ═══════════════════════════════════════════════════════
           CONSTANTS & PALETTE
           ═══════════════════════════════════════════════════════ */
        const C = {
            cyan:    0x00C2FF,
            pink:    0xF000B8,
            yellow:  0xF9E100,
            bg:      0x0A0B0D,
            surface: 0x14151C,
            grid:    0x00C2FF,
            gridDim: 0x1a1a2e,
        };

        /* ═══════════════════════════════════════════════════════
           GAME STATE
           ═══════════════════════════════════════════════════════ */
        const state = {
            isPlaying: false,
            health: 100,
            score: 0,
            kills: 0,
            totalTargets: 0,
            currentWeapon: 0,
            ammo: 30, maxAmmo: 30,
            isReloading: false,
            canShoot: true,
            targets: [],
            lootItems: [],
            materialized: 0,         // 0-100 world materialization
            distanceTraveled: 0,
            playerStartPos: new THREE.Vector3(0, 1.7, 0),
            tutorialStep: 0,
            tutorialComplete: false,
            inventory: [],
        };

        const weapons = [
            { name: 'pulse-rifle', damage: 35, fireRate: 130, range: 120, ammo: 30 },
            { name: 'signal-blade', damage: 70, fireRate: 350, range: 5.5, ammo: Infinity },
        ];

        const tutorialSteps = [
            { text: 'SIGNAL CALIBRATION ACTIVE', sub: 'Move with WASD to synchronize your signal', trigger: 'move', threshold: 8 },
            { text: 'LOOK AROUND', sub: 'Use mouse to scan the environment', trigger: 'look', threshold: 3 },
            { text: 'ACQUIRE SUPPLY', sub: 'Walk to the glowing crate and press E', trigger: 'loot', threshold: 1 },
            { text: 'ENGAGE TARGETS', sub: 'Aim and fire at the holographic targets', trigger: 'kill', threshold: 3 },
            { text: 'BLADE PROTOCOL', sub: 'Switch to blade [2] and strike a close target', trigger: 'blade_kill', threshold: 1 },
            { text: 'SIGNAL TRAINING COMPLETE', sub: 'You are ready for the Strands', trigger: 'done', threshold: 0 },
        ];

        /* ═══════════════════════════════════════════════════════
           SCENE SETUP
           ═══════════════════════════════════════════════════════ */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(C.bg);
        scene.fog = new THREE.FogExp2(0x050508, 0.018);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
        camera.position.set(0, 1.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.getElementById('game-container').appendChild(renderer.domElement);

        /* ═══════════════════════════════════════════════════════
           LIGHTING
           ═══════════════════════════════════════════════════════ */
        scene.add(new THREE.AmbientLight(0x1a1a2e, 0.4));

        const moonLight = new THREE.DirectionalLight(0x4466aa, 0.6);
        moonLight.position.set(-30, 60, -20);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.set(2048, 2048);
        moonLight.shadow.camera.far = 200;
        scene.add(moonLight);

        // Neon accent lights — these turn on as world materializes
        const neonLights = [];
        function createNeonLight(x, z, color, intensity = 2, dist = 20) {
            const light = new THREE.PointLight(color, 0, dist);
            light.position.set(x, 4, z);
            light.targetIntensity = intensity;
            scene.add(light);
            neonLights.push(light);
            return light;
        }

        /* ═══════════════════════════════════════════════════════
           GROUND — infinite-feel grid
           ═══════════════════════════════════════════════════════ */
        const groundGeo = new THREE.PlaneGeometry(200, 200, 1, 1);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x08080c,
            roughness: 0.95,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid overlay — starts bright, stays as undertone
        const gridHelper = new THREE.GridHelper(200, 100, 0x00C2FF, 0x0a1a2e);
        gridHelper.material.opacity = 0.4;
        gridHelper.material.transparent = true;
        gridHelper.position.y = 0.02;
        scene.add(gridHelper);

        // Road stripes
        const roadGeo = new THREE.PlaneGeometry(6, 200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.9 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.03;
        road.receiveShadow = true;
        scene.add(road);

        // Dashed center line
        for (let z = -90; z < 90; z += 6) {
            const dash = new THREE.Mesh(
                new THREE.PlaneGeometry(0.15, 3),
                new THREE.MeshBasicMaterial({ color: C.yellow, transparent: true, opacity: 0.6 })
            );
            dash.rotation.x = -Math.PI / 2;
            dash.position.set(0, 0.04, z);
            scene.add(dash);
        }

        /* ═══════════════════════════════════════════════════════
           CYBERPUNK BUILDINGS — start as wireframe, materialize
           ═══════════════════════════════════════════════════════ */
        const buildings = [];
        const buildingConfigs = [
            // Left side — row of buildings
            { x: -12, z: -40, w: 8, h: 25, d: 10 },
            { x: -14, z: -20, w: 10, h: 35, d: 8 },
            { x: -11, z: 0, w: 7, h: 18, d: 9 },
            { x: -15, z: 20, w: 12, h: 40, d: 10 },
            { x: -12, z: 45, w: 8, h: 22, d: 8 },
            { x: -13, z: 65, w: 9, h: 30, d: 10 },
            // Right side
            { x: 12, z: -35, w: 9, h: 30, d: 10 },
            { x: 14, z: -10, w: 10, h: 20, d: 8 },
            { x: 11, z: 10, w: 7, h: 28, d: 9 },
            { x: 13, z: 35, w: 11, h: 45, d: 10 },
            { x: 12, z: 55, w: 8, h: 20, d: 8 },
            { x: 14, z: 75, w: 10, h: 32, d: 10 },
        ];

        buildingConfigs.forEach(cfg => {
            const geo = new THREE.BoxGeometry(cfg.w, cfg.h, cfg.d);

            // Solid version — starts underground, rises up
            const solidMat = new THREE.MeshStandardMaterial({
                color: 0x12141e,
                roughness: 0.85,
                metalness: 0.3,
                transparent: true,
                opacity: 0,
            });
            const solid = new THREE.Mesh(geo, solidMat);
            solid.position.set(cfg.x, -cfg.h / 2, cfg.z);  // starts below ground
            solid.castShadow = true;
            solid.receiveShadow = true;
            scene.add(solid);

            // Wireframe version — starts visible, faint
            const wireMat = new THREE.MeshBasicMaterial({
                color: C.cyan,
                wireframe: true,
                transparent: true,
                opacity: 0.08,
            });
            const wire = new THREE.Mesh(geo.clone(), wireMat);
            wire.position.set(cfg.x, cfg.h / 2, cfg.z);  // wireframe is already in position as a ghost
            scene.add(wire);

            // Holographic scan ring — sweeps up the building during materialization
            const scanRingGeo = new THREE.RingGeometry(
                Math.max(cfg.w, cfg.d) * 0.5,
                Math.max(cfg.w, cfg.d) * 0.55,
                16
            );
            const scanRingMat = new THREE.MeshBasicMaterial({
                color: C.cyan,
                transparent: true,
                opacity: 0,
                side: THREE.DoubleSide,
            });
            const scanRing = new THREE.Mesh(scanRingGeo, scanRingMat);
            scanRing.rotation.x = -Math.PI / 2;
            scanRing.position.set(cfg.x, 0, cfg.z);
            scene.add(scanRing);

            // Window glow emissive strips
            const windowLines = [];
            const floors = Math.floor(cfg.h / 3);
            for (let f = 1; f < floors; f++) {
                // Front face windows — individual panes instead of strips
                const paneCount = Math.floor(cfg.w / 2.5);
                for (let p = 0; p < paneCount; p++) {
                    const paneW = (cfg.w * 0.8) / paneCount - 0.2;
                    const paneGeo = new THREE.PlaneGeometry(paneW, 0.8);
                    const paneColor = [C.cyan, C.pink, C.yellow][(f + p) % 3];
                    const paneMat = new THREE.MeshBasicMaterial({
                        color: paneColor,
                        transparent: true,
                        opacity: 0,
                        side: THREE.DoubleSide,
                    });
                    const pane = new THREE.Mesh(paneGeo, paneMat);
                    const paneX = cfg.x - (cfg.w * 0.4) + (p + 0.5) * (cfg.w * 0.8 / paneCount);
                    pane.position.set(paneX, f * 3 + 1, cfg.z - cfg.d / 2 - 0.05);
                    pane.userData.flickerSeed = Math.random() * 100;
                    scene.add(pane);
                    windowLines.push(pane);

                    // Back face mirror
                    const paneB = new THREE.Mesh(paneGeo.clone(), paneMat.clone());
                    paneB.position.set(paneX, f * 3 + 1, cfg.z + cfg.d / 2 + 0.05);
                    paneB.userData.flickerSeed = Math.random() * 100;
                    scene.add(paneB);
                    windowLines.push(paneB);
                }
            }

            // Roof neon accent — pulsing edge
            const roofGeo = new THREE.BoxGeometry(cfg.w + 0.5, 0.15, cfg.d + 0.5);
            const roofMat = new THREE.MeshBasicMaterial({
                color: C.cyan,
                transparent: true,
                opacity: 0,
            });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.set(cfg.x, 0, cfg.z);  // starts at ground, rises with building
            scene.add(roof);

            // Vertical neon edge strips on building corners
            const edgeLines = [];
            const corners = [
                [cfg.x - cfg.w/2, cfg.z - cfg.d/2],
                [cfg.x + cfg.w/2, cfg.z - cfg.d/2],
                [cfg.x - cfg.w/2, cfg.z + cfg.d/2],
                [cfg.x + cfg.w/2, cfg.z + cfg.d/2],
            ];
            corners.forEach(([cx, cz]) => {
                const edgeGeo = new THREE.BoxGeometry(0.04, cfg.h, 0.04);
                const edgeMat = new THREE.MeshBasicMaterial({
                    color: C.cyan,
                    transparent: true,
                    opacity: 0,
                });
                const edge = new THREE.Mesh(edgeGeo, edgeMat);
                edge.position.set(cx, -cfg.h / 2, cz);  // starts underground
                scene.add(edge);
                edgeLines.push(edge);
            });

            buildings.push({ solid, wire, windowLines, roof, scanRing, edgeLines, cfg, matProgress: 0 });

            // Neon light at base
            createNeonLight(cfg.x + (cfg.x > 0 ? -cfg.w/2 : cfg.w/2), cfg.z, [C.cyan, C.pink][Math.random() > 0.5 ? 0 : 1], 1.5 + Math.random(), 15);
        });

        /* ═══════════════════════════════════════════════════════
           NEON SIGNS — floating holographic panels
           ═══════════════════════════════════════════════════════ */
        const signs = [];
        const signTexts = ['STRANDS', 'SIGNAL', 'SYNC', 'LAYER-U', 'EVERYWEAR', 'MAIT', 'CODEX', 'NPC.NET'];
        buildingConfigs.forEach((cfg, i) => {
            if (i % 2 === 0) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 256, 64);
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'center';
                const colors = ['#00C2FF', '#F000B8', '#F9E100'];
                ctx.fillStyle = colors[i % 3];
                ctx.fillText(signTexts[i % signTexts.length], 128, 42);

                const tex = new THREE.CanvasTexture(canvas);
                const signMat = new THREE.MeshBasicMaterial({
                    map: tex,
                    transparent: true,
                    opacity: 0,
                    side: THREE.DoubleSide,
                });
                const signMesh = new THREE.Mesh(new THREE.PlaneGeometry(5, 1.25), signMat);
                const signX = cfg.x + (cfg.x > 0 ? -cfg.w/2 - 0.1 : cfg.w/2 + 0.1);
                signMesh.position.set(signX, cfg.h * 0.6, cfg.z);
                signMesh.rotation.y = cfg.x > 0 ? Math.PI / 2 : -Math.PI / 2;
                scene.add(signMesh);
                signs.push(signMesh);
            }
        });

        /* ═══════════════════════════════════════════════════════
           RAIN PARTICLE SYSTEM
           ═══════════════════════════════════════════════════════ */
        const rainCount = 8000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPositions = new Float32Array(rainCount * 3);
        const rainVelocities = new Float32Array(rainCount);
        for (let i = 0; i < rainCount; i++) {
            rainPositions[i * 3] = (Math.random() - 0.5) * 120;
            rainPositions[i * 3 + 1] = Math.random() * 60;
            rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
            rainVelocities[i] = 0.3 + Math.random() * 0.5;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
        const rainMat = new THREE.PointsMaterial({
            color: 0x5588aa,
            size: 0.08,
            transparent: true,
            opacity: 0,
        });
        const rain = new THREE.Points(rainGeo, rainMat);
        scene.add(rain);

        /* ═══════════════════════════════════════════════════════
           STREET LIGHTS — neon poles
           ═══════════════════════════════════════════════════════ */
        for (let z = -60; z <= 80; z += 20) {
            [-6, 6].forEach(x => {
                // Pole
                const pole = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.08, 0.08, 5, 6),
                    new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.8, roughness: 0.3 })
                );
                pole.position.set(x, 2.5, z);
                pole.castShadow = true;
                scene.add(pole);

                // Light head
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.6, 0.1, 0.3),
                    new THREE.MeshBasicMaterial({ color: C.cyan, transparent: true, opacity: 0 })
                );
                head.position.set(x, 5, z);
                head.userData.isStreetLight = true;
                scene.add(head);

                createNeonLight(x, z, C.cyan, 1.5, 12);
            });
        }

        /* ═══════════════════════════════════════════════════════
           AUDIO
           ═══════════════════════════════════════════════════════ */
        let audioCtx;
        function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playPulseShot() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const noise = audioCtx.createBufferSource();
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < buf.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.015));
            noise.buffer = buf;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'bandpass'; filt.frequency.value = 3000; filt.Q.value = 2;
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.06);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); noise.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            noise.start(); noise.stop(audioCtx.currentTime + 0.1);
        }

        function playBladeSwing() {
            if (!audioCtx) return;
            const noise = audioCtx.createBufferSource();
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < buf.length; i++) {
                const t = i / audioCtx.sampleRate;
                d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 12) * Math.sin(t * 300);
            }
            noise.buffer = buf;
            const gain = audioCtx.createGain(); gain.gain.value = 0.15;
            noise.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function playLootPickup() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playTargetDown() {
            if (!audioCtx) return;
            [800, 1000, 1200].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.06);
                }, i * 50);
            });
        }

        function playReload() {
            if (!audioCtx) return;
            [400, 600, 800].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square'; osc.frequency.value = freq;
                    gain.gain.value = 0.06;
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
                }, 150 + i * 150);
            });
        }

        /* ═══════════════════════════════════════════════════════
           HOLOGRAPHIC TARGETS
           ═══════════════════════════════════════════════════════ */
        class HoloTarget {
            constructor(pos, type = 'static') {
                this.health = 50;
                this.isDead = false;
                this.deathTimer = 0;
                this.type = type;
                this.bobPhase = Math.random() * Math.PI * 2;

                this.group = new THREE.Group();

                // Outer ring
                const ringGeo = new THREE.TorusGeometry(0.6, 0.04, 8, 24);
                const ringMat = new THREE.MeshBasicMaterial({ color: C.pink, transparent: true, opacity: 0.8 });
                this.ring = new THREE.Mesh(ringGeo, ringMat);
                this.ring.rotation.x = Math.PI / 2;
                this.ring.position.y = 1.5;
                this.group.add(this.ring);

                // Inner diamond target
                const diaGeo = new THREE.OctahedronGeometry(0.35, 0);
                const diaMat = new THREE.MeshBasicMaterial({
                    color: C.cyan,
                    transparent: true,
                    opacity: 0.7,
                    wireframe: false,
                });
                this.diamond = new THREE.Mesh(diaGeo, diaMat);
                this.diamond.position.y = 1.5;
                this.group.add(this.diamond);

                // Holographic body silhouette — simple capsule
                const bodyGeo = new THREE.CapsuleGeometry(0.25, 0.8, 4, 8);
                const bodyMat = new THREE.MeshBasicMaterial({
                    color: C.cyan,
                    transparent: true,
                    opacity: 0.15,
                    wireframe: true,
                });
                this.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.body.position.y = 1.0;
                this.group.add(this.body);

                // Base glow
                const baseGeo = new THREE.RingGeometry(0.2, 0.7, 16);
                const baseMat = new THREE.MeshBasicMaterial({
                    color: C.pink,
                    transparent: true,
                    opacity: 0.3,
                    side: THREE.DoubleSide,
                });
                this.base = new THREE.Mesh(baseGeo, baseMat);
                this.base.rotation.x = -Math.PI / 2;
                this.base.position.y = 0.05;
                this.group.add(this.base);

                // Point light
                this.light = new THREE.PointLight(C.pink, 0.8, 6);
                this.light.position.y = 1.5;
                this.group.add(this.light);

                this.group.position.copy(pos);
                scene.add(this.group);
            }

            update(delta, time) {
                if (this.isDead) {
                    this.deathTimer += delta;
                    // Dissolve effect
                    this.group.scale.multiplyScalar(0.92);
                    this.group.children.forEach(c => {
                        if (c.material) c.material.opacity *= 0.9;
                    });
                    if (this.deathTimer > 1.5) {
                        scene.remove(this.group);
                        return false;
                    }
                    return true;
                }

                // Bob and spin
                this.diamond.rotation.y += delta * 1.5;
                this.diamond.rotation.x += delta * 0.5;
                this.ring.rotation.z += delta * 0.8;
                const bob = Math.sin(time * 2 + this.bobPhase) * 0.1;
                this.diamond.position.y = 1.5 + bob;
                this.ring.position.y = 1.5 + bob;

                // Flicker
                const flicker = 0.6 + Math.sin(time * 15 + this.bobPhase) * 0.15;
                this.light.intensity = flicker;

                return true;
            }

            takeDamage(amount) {
                this.health -= amount;
                // Flash white
                this.diamond.material.color.setHex(0xffffff);
                setTimeout(() => { if (!this.isDead) this.diamond.material.color.setHex(C.cyan); }, 80);

                if (this.health <= 0) this.die();
            }

            die() {
                this.isDead = true;
                state.kills++;
                state.score += 50;
                playTargetDown();
                showScorePopup('+50 SYNC');
                updateHUD();
                checkTutorial('kill');
                if (state.currentWeapon === 1) checkTutorial('blade_kill');
            }
        }

        /* ═══════════════════════════════════════════════════════
           TUTORIAL SYSTEM
           ═══════════════════════════════════════════════════════ */
        const tutorialProgress = { move: 0, look: 0, loot: 0, kill: 0, blade_kill: 0 };

        function checkTutorial(action) {
            if (state.tutorialComplete) return;
            const step = tutorialSteps[state.tutorialStep];
            if (!step || step.trigger !== action) return;

            tutorialProgress[action]++;
            if (tutorialProgress[action] >= step.threshold) {
                state.tutorialStep++;
                if (state.tutorialStep >= tutorialSteps.length) {
                    state.tutorialComplete = true;
                    showTutorialPrompt('SIGNAL TRAINING COMPLETE', 'Welcome to the Strands');
                    setTimeout(() => { document.getElementById('tutorial-prompt').style.opacity = '0'; }, 3000);
                } else {
                    showTutorialPrompt(tutorialSteps[state.tutorialStep].text, tutorialSteps[state.tutorialStep].sub);
                }
            }
        }

        function showTutorialPrompt(text, sub) {
            const el = document.getElementById('tutorial-prompt');
            el.innerHTML = `${text}<div class="sub">${sub || ''}</div>`;
            el.style.opacity = '1';
        }

        function showLootPopup(text) {
            const el = document.getElementById('loot-popup');
            el.textContent = text;
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, 2000);
        }

        function showScorePopup(text) {
            const el = document.createElement('div');
            el.className = 'score-popup';
            el.textContent = text;
            el.style.left = (innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
            el.style.top = (innerHeight / 2 - 40) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        /* ═══════════════════════════════════════════════════════
           WEAPON ACTIONS
           ═══════════════════════════════════════════════════════ */
        function shoot() {
            if (!state.canShoot || state.isReloading) return;
            const weapon = weapons[state.currentWeapon];

            if (state.currentWeapon === 0) {
                if (state.ammo <= 0) { reload(); return; }
                state.ammo--;
                state.canShoot = false;
                playPulseShot();

                muzzleFlash.intensity = 6;
                setTimeout(() => { muzzleFlash.intensity = 0; }, 40);
                weaponGroup.rotation.x = -0.12;
                setTimeout(() => { weaponGroup.rotation.x = 0; }, 50);

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                state.targets.forEach(t => {
                    if (!t.isDead) {
                        const hits = raycaster.intersectObject(t.group, true);
                        if (hits.length > 0 && hits[0].distance < weapon.range) {
                            t.takeDamage(weapon.damage);
                        }
                    }
                });
                updateHUD();
                setTimeout(() => { state.canShoot = true; }, weapon.fireRate);

            } else {
                state.canShoot = false;
                playBladeSwing();
                bladeGroup.rotation.x = -Math.PI / 1.5;
                bladeGroup.rotation.z = 0.4;
                setTimeout(() => { bladeGroup.rotation.x = 0; bladeGroup.rotation.z = 0; }, 180);

                const playerPos = camera.position.clone();
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                state.targets.forEach(t => {
                    if (!t.isDead) {
                        const toTarget = t.group.position.clone().sub(playerPos);
                        toTarget.y = 0;
                        if (toTarget.length() < weapon.range && forward.dot(toTarget.normalize()) > -0.2) {
                            t.takeDamage(weapon.damage);
                        }
                    }
                });
                setTimeout(() => { state.canShoot = true; }, weapon.fireRate);
            }
        }

        function reload() {
            if (state.isReloading || state.ammo === state.maxAmmo) return;
            state.isReloading = true;
            playReload();
            weaponGroup.rotation.z = 0.4;
            setTimeout(() => {
                state.ammo = state.maxAmmo;
                state.isReloading = false;
                weaponGroup.rotation.z = 0;
                updateHUD();
            }, 1200);
        }

        function switchWeapon(idx) {
            if (idx === state.currentWeapon) return;
            state.currentWeapon = idx;
            rifleGroup.visible = idx === 0;
            bladeGroup.visible = idx === 1;
            document.getElementById('weapon-1').classList.toggle('active', idx === 0);
            document.getElementById('weapon-2').classList.toggle('active', idx === 1);
        }

        function tryLoot() {
            const playerPos = camera.position;
            state.lootItems.forEach(loot => {
                if (!loot.collected && loot.group.position.distanceTo(playerPos) < 2.5) {
                    loot.collect();
                }
            });
        }

        /* ═══════════════════════════════════════════════════════
           HUD
           ═══════════════════════════════════════════════════════ */
        function updateHUD() {
            document.getElementById('health-fill').style.width = Math.max(0, state.health) + '%';
            document.getElementById('score').textContent = state.score;
            document.getElementById('kills').textContent = state.kills;
            document.getElementById('total-targets').textContent = state.totalTargets;
            document.getElementById('ammo').textContent = state.ammo;
            document.getElementById('mat-percent').textContent = Math.floor(state.materialized);
        }

        /* ═══════════════════════════════════════════════════════
           WORLD MATERIALIZATION SYSTEM
           Per-building distance-based: buildings near the player
           rise from the ground, wireframes solidify, windows
           flicker on floor-by-floor, scan rings sweep upward.
           ═══════════════════════════════════════════════════════ */
        const MAT_RADIUS = 35;       // distance at which buildings start materializing
        const MAT_FULL_RADIUS = 12;  // fully materialized within this range
        const elapsedTime = { v: 0 };

        function updateMaterialization(time) {
            elapsedTime.v = time;
            const globalT = state.materialized / 100;

            // Grid: starts bright, fades to subtle undertone
            gridHelper.material.opacity = 0.5 - globalT * 0.35;

            // Per-building materialization based on distance to player
            let totalMat = 0;
            const playerXZ = new THREE.Vector2(camera.position.x, camera.position.z);

            buildings.forEach(b => {
                const bXZ = new THREE.Vector2(b.cfg.x, b.cfg.z);
                const dist = playerXZ.distanceTo(bXZ);

                // Calculate this building's materialization 0-1
                let bTarget = 0;
                if (dist < MAT_FULL_RADIUS) bTarget = 1;
                else if (dist < MAT_RADIUS) bTarget = 1 - (dist - MAT_FULL_RADIUS) / (MAT_RADIUS - MAT_FULL_RADIUS);

                // Also factor in global progress (so distant buildings still eventually appear)
                bTarget = Math.max(bTarget, globalT * 0.6);

                // Smooth interpolation — buildings don't snap
                b.matProgress += (bTarget - b.matProgress) * 0.035;
                const t = Math.min(1, b.matProgress);
                totalMat += t;

                const h = b.cfg.h;

                // ── RISE: solid building rises from underground ──
                const riseY = -h / 2 + t * h;  // from -h/2 (underground) to h/2 (correct)
                b.solid.position.y = riseY;
                b.solid.material.opacity = t * 0.92;

                // Edge lines rise with building
                b.edgeLines.forEach(e => {
                    e.position.y = riseY;
                    e.material.opacity = t > 0.1 ? Math.min(0.4, t * 0.5) : 0;
                });

                // Roof rises to top
                b.roof.position.y = Math.max(0.1, riseY + h / 2 + 0.1);
                b.roof.material.opacity = t > 0.7 ? (t - 0.7) * 1.5 : 0;

                // ── WIREFRAME: fades as solid appears ──
                b.wire.material.opacity = t < 0.15 ? 0.08 + t * 1.5 :  // brightens first
                                          t < 0.5 ? 0.3 * (1 - (t - 0.15) / 0.35) : // then fades
                                          0.02;  // ghost trace remains

                // Wireframe pulses while materializing
                if (t > 0.05 && t < 0.6) {
                    b.wire.material.color.setHex(
                        Math.sin(time * 8 + b.cfg.z) > 0 ? C.cyan : C.pink
                    );
                }

                // ── SCAN RING: sweeps up the building ──
                if (t > 0.05 && t < 0.85) {
                    const scanY = t * h * 1.2;
                    b.scanRing.position.y = scanY;
                    b.scanRing.material.opacity = 0.4 * (1 - Math.abs(t - 0.45) / 0.45);
                    b.scanRing.scale.setScalar(1 + Math.sin(time * 6) * 0.05);
                } else {
                    b.scanRing.material.opacity = 0;
                }

                // ── WINDOWS: flicker on floor-by-floor from bottom ──
                const totalWindows = b.windowLines.length;
                b.windowLines.forEach((w, i) => {
                    const windowProgress = i / totalWindows;
                    const windowThreshold = windowProgress * 0.7 + 0.2; // staggered activation
                    if (t > windowThreshold) {
                        const flicker = Math.sin(time * 12 + (w.userData.flickerSeed || i)) * 0.5 + 0.5;
                        const baseOpacity = 0.25 + flicker * 0.25;
                        // Some windows randomly go dark
                        const isDark = Math.sin((w.userData.flickerSeed || i) * 7.3) > 0.7;
                        w.material.opacity = isDark ? baseOpacity * 0.1 : baseOpacity;
                    } else if (t > windowThreshold - 0.1) {
                        // Glitch-flicker as window activates
                        w.material.opacity = Math.random() > 0.7 ? 0.3 : 0;
                    } else {
                        w.material.opacity = 0;
                    }
                });
            });

            // Average materialization across all buildings
            const avgMat = totalMat / buildings.length;

            // Neon lights fade in
            neonLights.forEach(l => { l.intensity = l.targetIntensity * Math.min(1, avgMat * 1.3); });

            // Rain increases with materialization
            rainMat.opacity = avgMat * 0.4;

            // Signs
            signs.forEach((s, i) => {
                const signFlicker = Math.sin(time * 3 + i * 2.1) > -0.1 ? 1 : 0.2;
                s.material.opacity = avgMat * 0.85 * signFlicker;
            });

            // Street light heads
            scene.traverse(obj => {
                if (obj.userData.isStreetLight) obj.material.opacity = Math.min(1, avgMat * 1.5);
            });

            // Fog density increases for atmosphere
            scene.fog.density = 0.022 - avgMat * 0.006; // starts thicker, clears slightly

            // Ground gets wetter looking as city appears
            const groundColor = new THREE.Color(0x08080c).lerp(new THREE.Color(0x040408), avgMat);
            groundMat.color.copy(groundColor);
            groundMat.roughness = 0.95 - avgMat * 0.3; // slightly reflective wet ground

            // Zone name
            const zoneEl = document.getElementById('zone-name');
            if (avgMat < 0.15) zoneEl.textContent = 'GRID ORIGIN';
            else if (avgMat < 0.4) zoneEl.textContent = 'MATERIALIZING...';
            else if (avgMat < 0.7) zoneEl.textContent = 'NEON DISTRICT';
            else zoneEl.textContent = 'NIGHT CITY';

            // Progress bar
            document.getElementById('materialize-bar').style.opacity = avgMat < 0.95 ? '1' : '0';
            document.getElementById('materialize-fill').style.width = (avgMat * 100) + '%';
        }

        /* ═══════════════════════════════════════════════════════
           INPUT
           ═══════════════════════════════════════════════════════ */
        let moveF = false, moveB = false, moveL = false, moveR = false;
        let yaw = 0, pitch = 0, lookDelta = 0;

        document.addEventListener('keydown', e => {
            if (!state.isPlaying) return;
            switch (e.code) {
                case 'KeyW': moveF = true; break;
                case 'KeyS': moveB = true; break;
                case 'KeyA': moveL = true; break;
                case 'KeyD': moveR = true; break;
                case 'KeyR': reload(); break;
                case 'KeyE': tryLoot(); break;
                case 'Digit1': switchWeapon(0); break;
                case 'Digit2': switchWeapon(1); break;
            }
        });
        document.addEventListener('keyup', e => {
            switch (e.code) {
                case 'KeyW': moveF = false; break;
                case 'KeyS': moveB = false; break;
                case 'KeyA': moveL = false; break;
                case 'KeyD': moveR = false; break;
            }
        });
        document.addEventListener('mousemove', e => {
            if (!state.isPlaying || document.pointerLockElement !== renderer.domElement) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, pitch));
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            lookDelta += Math.abs(e.movementX) + Math.abs(e.movementY);
        });
        document.addEventListener('mousedown', e => {
            if (e.button === 0 && state.isPlaying) shoot();
        });

        /* ═══════════════════════════════════════════════════════
           GAME START
           ═══════════════════════════════════════════════════════ */
        document.getElementById('start-screen').addEventListener('click', () => {
            initAudio();
            document.getElementById('start-screen').style.display = 'none';
            renderer.domElement.requestPointerLock();
            state.isPlaying = true;
            spawnTargets();
            spawnLoot();
            showTutorialPrompt(tutorialSteps[0].text, tutorialSteps[0].sub);
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        /* ═══════════════════════════════════════════════════════
           GAME LOOP
           ═══════════════════════════════════════════════════════ */
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3();
        let prevPos = camera.position.clone();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (state.isPlaying) {
                // ── MOVEMENT ──
                velocity.set(0, 0, 0);
                if (moveF) velocity.z = -1;
                if (moveB) velocity.z = 1;
                if (moveL) velocity.x = -1;
                if (moveR) velocity.x = 1;

                if (velocity.length() > 0) {
                    velocity.normalize().applyQuaternion(camera.quaternion);
                    velocity.y = 0;
                    velocity.multiplyScalar(5.5 * delta);
                    const newPos = camera.position.clone().add(velocity);
                    newPos.x = Math.max(-8, Math.min(8, newPos.x));
                    newPos.z = Math.max(-90, Math.min(10, newPos.z));
                    camera.position.copy(newPos);

                    // Track distance
                    const moved = camera.position.distanceTo(prevPos);
                    state.distanceTraveled += moved;

                    // Weapon bob
                    const bob = Date.now() * 0.01;
                    weaponGroup.position.y = Math.sin(bob) * 0.015 - 0.28;
                    weaponGroup.position.x = Math.cos(bob * 0.5) * 0.008 + (state.currentWeapon === 0 ? 0.3 : 0.5);
                }
                prevPos.copy(camera.position);

                // ── MATERIALIZATION — distance-driven ──
                const matTarget = Math.min(100, state.distanceTraveled * 0.7);
                state.materialized += (matTarget - state.materialized) * 0.02;
                updateMaterialization(time);

                // ── TUTORIAL CHECKS ──
                if (state.distanceTraveled > 0.5) checkTutorial('move');
                if (lookDelta > 200) { checkTutorial('look'); lookDelta = 0; }

                // ── UPDATE ENTITIES ──
                state.targets = state.targets.filter(t => t.update(delta, time));
                state.lootItems = state.lootItems.filter(l => l.update(delta, time));

                // ── BLADE PULSE ANIMATION ──
                if (bladeGroup.visible) {
                    bladeGroup.traverse(child => {
                        if (child.userData.isPulseLine) {
                            child.position.y = child.userData.baseY + Math.sin(time * 8 + child.userData.baseY * 2) * 0.02;
                            child.material.opacity = 0.5 + Math.sin(time * 12 + child.userData.baseY) * 0.3;
                            child.material.transparent = true;
                        }
                    });
                    bladeLight.intensity = 0.4 + Math.sin(time * 6) * 0.2;
                }

                // ── RAIN ──
                const rPos = rain.geometry.attributes.position.array;
                for (let i = 0; i < rainCount; i++) {
                    rPos[i * 3 + 1] -= rainVelocities[i];
                    if (rPos[i * 3 + 1] < 0) {
                        rPos[i * 3 + 1] = 50 + Math.random() * 10;
                        rPos[i * 3] = camera.position.x + (Math.random() - 0.5) * 80;
                        rPos[i * 3 + 2] = camera.position.z + (Math.random() - 0.5) * 80;
                    }
                }
                rain.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
